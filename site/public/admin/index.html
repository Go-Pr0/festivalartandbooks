<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Content management for Festival Art & Books — rare Tolkien books, collectables, and scholarly guides." />
  <meta name="theme-color" content="#14224f" />
  <title>Content Manager | Festival Art & Books</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <!-- Completes Decap OAuth when popup postMessage breaks after GitHub redirect (COOP). -->
  <script>
    (function () {
      if (typeof BroadcastChannel === 'undefined') return;
      var origin = window.location.origin;
      var done = false;
      var channel = new BroadcastChannel('fab-decap-oauth');
      channel.onmessage = function (e) {
        if (done || !e.data || e.data.type !== 'oauth-result') return;
        done = true;
        var content = e.data.content;
        var status = e.data.status;
        // decap-cms-lib-auth: handshake then token (netlify-auth.js).
        window.dispatchEvent(
          new MessageEvent('message', { data: 'authorizing:github', origin: origin })
        );
        setTimeout(function () {
          window.dispatchEvent(
            new MessageEvent('message', {
              data: 'authorization:github:' + status + ':' + JSON.stringify(content),
              origin: origin,
            })
          );
          channel.close();
        }, 100);
      };
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle('/admin/preview.css');
  </script>
</body>
</html>
