   public_folder: ../../assets/guides
   fields:
     - label: Title
       name: title
       widget: string
     - label: Description
       name: description
       widget: text
       hint: Meta description and first-100-words answer summary.
     - label: Pillar guide
       name: pillar
       widget: boolean
       default: false
     - label: Cluster
       name: cluster
       widget: string
       required: false
       hint: e.g. hobbit-first-editions — groups supporting pages under a pillar.
     - label: Chapter order
       name: chapterOrder
       widget: number
       required: false
       value_type: int
       hint: Order within a cluster/series (0 = first chapter)
     - label: Hero image
       name: heroImage
       widget: image
       required: false
     - label: Hero image alt text
       name: heroAlt
       widget: string
       required: false
     - label: Date published
       name: datePublished
       widget: datetime
     - label: Date modified
       name: dateModified
       widget: datetime
       required: false
     - label: FAQ
       name: faq
       widget: list
       fields:
         - label: Question
           name: question
           widget: string
         - label: Answer
           name: answer
           widget: markdown
       required: false
       summary: '{{fields.question}}'
     - label: Draft (hide from site)
       name: draft
       widget: boolean
       default: false
       hint: Tick to hide this entry from the public site while you work on it.
     - label: Body
       name: body
       widget: markdown
       required: false
       hint: Guide body — use H2/H3 as real questions for GEO.
