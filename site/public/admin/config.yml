site_url: https://festivalartandbooks.com
display_url: festivalartandbooks.com
logo_url: https://festivalartandbooks.com/logo.png

editor:
 preview: true

backend:
 name: github
 repo: Go-Pr0/festivalartandbooks
 branch: main
 base_url: https://festivalartandbooks.com
 auth_endpoint: api/auth

# Enables the CMS UI without GitHub auth when running `npm run dev` locally
local_backend: true

# Default media paths (overridden per collection / file where needed)
media_folder: site/src/assets/inventory
public_folder: ../../assets/inventory
collections:
 - name: books
   label: Books & Collectables
   label_singular: Book / Collectable
   icon: book
   folder: site/src/content/books
   create: true
   delete: true
   extension: md
   format: frontmatter
   slug: '{{title}}'
   identifier_field: title
   summary: '{{title}} — {{fields.availability}}'
   preview_path: books/{{slug}}
   sortable_fields:
     - title
   view_filters:
     - label: In Stock
       field: availability
       pattern: InStock
     - label: Sold
       field: availability
       pattern: OutOfStock
     - label: Drafts
       field: draft
       pattern: true
   media_folder: site/src/assets/inventory
   public_folder: ../../assets/inventory
   fields:
     - label: Title
       name: title
       widget: string
       hint: Short working title used as the filename slug, e.g. 'Hobbit First Edition 1937 Fine'
     - label: Description
       name: description
       widget: text
       hint: One-sentence summary for SEO and catalogue listing.
     - label: Edition / Full Title
       name: editionTitle
       widget: string
       required: false
       hint: e.g. 'The Hobbit, first edition, second impression, 1937'
     - label: Author
       name: author
       widget: string
       default: J.R.R. Tolkien
     - label: Publisher
       name: publisher
       widget: string
       required: false
       hint: e.g. 'George Allen & Unwin'
     - label: Year Published
       name: datePublished
       widget: string
       required: false
       hint: The book's own publication year, e.g. '1937'
     - label: Format
       name: bookFormat
       widget: select
       options:
         - label: Hardcover
           value: Hardcover
         - label: Paperback
           value: Paperback
         - label: EBook
           value: EBook
         - label: AudioBook
           value: AudioBook
       required: false
     - label: ISBN
       name: isbn
       widget: string
       required: false
     - label: Kind
       name: kind
       widget: select
       options:
         - label: Book
           value: book
         - label: Collectable / Memorabilia
           value: collectable
       required: false
     - label: Condition
       name: condition
       widget: string
       required: false
       hint: Brief condition grade, e.g. 'Fine in Very Good+ dust jacket'
     - label: Images
       name: images
       widget: list
       field:
         label: Image
         name: image
         widget: image
         hint: Use a descriptive filename, e.g. tolkien-hobbit-1937-first-edition-front-cover.jpg
       required: false
       collapsed: true
       summary: '{{fields.image}}'
     - label: Price (£)
       name: price
       widget: number
       required: false
       value_type: float
       min: 0
     - label: Currency
       name: priceCurrency
       widget: string
       default: GBP
     - label: Availability
       name: availability
       widget: select
       options:
         - label: In Stock
           value: InStock
         - label: Sold / Out of Stock
           value: OutOfStock
         - label: Pre-Order
           value: PreOrder
       default: InStock
       hint: Set to Sold when the item is no longer for sale. In Stock items appear in the catalogue.
     - label: Listing URL (eBay / AbeBooks)
       name: offerUrl
       widget: string
       required: false
       hint: Full URL to the marketplace listing.
     - label: Draft (hide from site)
       name: draft
       widget: boolean
       default: false
       hint: Tick to hide this entry from the public site while you work on it.
     - label: Full description
       name: body
       widget: markdown
       required: false
       hint: Longer description, issue-point notes, provenance, etc. Rendered on the catalogue entry.
 - name: journal
   label: Journal
   label_singular: Journal entry
   icon: edit_note
   folder: site/src/content/journal
   create: true
   delete: true
   extension: md
   format: frontmatter
   slug: '{{title}}'
   identifier_field: title
   summary: '{{title}} — {{fields.datePublished}}'
   preview_path: journal/{{slug}}
   sortable_fields:
     - title
     - datePublished
   media_folder: site/src/assets/journal
   public_folder: ../../assets/journal
   fields:
     - label: Title
       name: title
       widget: string
     - label: Description
       name: description
       widget: text
       hint: Meta description and summary.
     - label: Hero image
       name: heroImage
       widget: image
       required: false
     - label: Hero image alt text
       name: heroAlt
       widget: string
       required: false
     - label: Date published
       name: datePublished
       widget: datetime
     - label: Date modified
       name: dateModified
       widget: datetime
       required: false
     - label: Draft (hide from site)
       name: draft
       widget: boolean
       default: false
       hint: Tick to hide this entry from the public site while you work on it.
     - label: Body
       name: body
       widget: markdown
       required: false
       hint: Essay body rendered on the journal entry page.
 - name: guides
   label: Collecting Guides
   label_singular: Guide
   icon: menu_book
