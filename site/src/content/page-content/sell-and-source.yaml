seo:
  title: "Sell & Source Rare Tolkien Books | Festival Art & Books"
  description: >-
    We buy rare Tolkien books, offer consignment for high-value items over £10,000,
    and source books confidentially for collectors and institutions. Contact Mark Faith.

text:
  heroEyebrow: "Sell & Source"
  heroH1: "Sell, consign, or source rare Tolkien books"
  ctaContact: "Contact Mark"

  buyHeading: "We buy Tolkien books"
  buyBody: >-
    We buy Tolkien books. We are always buying rare Tolkien books. Contact us to buy
    one or your whole collection!

  consignmentHeading: "Consignment"
  consignmentBody: >-
    We sell your Tolkien books on consignment. We can sell your high value rare Tolkien
    books (those over £10,000) on a consignment agreement. Please contact Mark

  sourcingHeading: "Sourcing"
  sourcingBody: >-
    We source rare Tolkien books. We have hundreds of customers and relationships with
    many other sources. We can find books or confidentially source them for you. We have
    helped many high networth individuals or institutions acquire books discreetly. This
    is actually core to our business activities.
