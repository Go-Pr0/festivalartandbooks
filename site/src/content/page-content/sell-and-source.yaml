seo:
  title: "Sell, Source & Appraisals | Rare Tolkien Books | Festival Art & Books"
  description: >-
    We buy rare Tolkien books, offer consignment for high-value items over £10,000,
    source books confidentially for collectors and institutions, and provide official
    valuations for insurance and probate. Contact Mark Faith.

text:
  heroEyebrow: "Sell, Source and Appraisals"
  heroH1: "Sell, consign, source, or appraise rare Tolkien books"
  ctaContact: "Contact Mark"

  buyHeading: "We buy Tolkien books"
  buyBody: >-
    We buy Tolkien books. We are always buying rare Tolkien books. Contact us to buy
    one or your whole collection!

  consignmentHeading: "Consignment"
  consignmentBody: >-
    We sell your Tolkien books on consignment. We can sell your high value rare Tolkien
    books (those over £10,000) on a consignment agreement. Please contact Mark

  sourcingHeading: "Sourcing"
  sourcingBody: >-
    We source rare Tolkien books. We have hundreds of customers and relationships with
    many other sources. We can find books or confidentially source them for you. We have
    helped many high networth individuals or institutions acquire books discreetly. This
    is actually core to our business activities.

  appraisalsHeading: "Appraisals, Insurance and Probate"
  appraisalsBody: >-
    Based on our 25 years in business, we can provide official valuations for one book,
    or an entire Tolkien collection. After an initial assessment by email photos, we
    would need to examine the book in person. We charge a percentage of the value as the
    fee. If we eventually sell the book or books for you under sales consignment, the fee
    will be refunded. Per our collector guide, it is the condition that matters most to
    value, not just the printing. In many cases your books may be worth more than average
    market price. On collections, the availability of many rare copies in one location
    adds to the value for the convenience. Contact Mark for more information.
