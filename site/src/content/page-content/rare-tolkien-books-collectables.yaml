seo:
  title: "Rare Tolkien Books & Collectables | Festival Art & Books"
  description: "Rare Tolkien books are the first and early printings of The Hobbit and The Lord of the Rings. Mark Faith deals in fine, complete first editions, posters and memorabilia."

heroImage: "../../assets/showcase/tolkien-rare-books-collection-montage.jpg"
heroImageAlt: "Collection of rare J.R.R. Tolkien first-edition books, posters and memorabilia"

text:
  heroEyebrow: "The Collection"
  heroH1: "Rare Tolkien Books & Collectables"
  heroIntro: '“Rare Tolkien books” mostly means the first and early printings of the very first editions ever sold to the public, chiefly The Hobbit (1937) and The Lord of the Rings (1954–55). A serious collection can run to hundreds or even a thousand books, plus posters and memorabilia.'
  whatWeDeelInEyebrow: "What we deal in"
  whatWeDealInHeading: "First and early printings, chosen for condition"
  whatWeDealInP1: "The most collected titles are The Hobbit and The Lord of the Rings, and the hundreds of printings and new editions of just those titles. They have never been out of print, and Tolkien collecting is now so popular that any edition, in any language, is collected somewhere in the world, not only in the English-speaking one."
  whatWeDealInP2: "Newer editions can be collectable too, especially deluxe editions with small print runs, but they are not expensive to buy. The pieces we handle are the fine, complete copies: the older the printing and the closer it is to the first, the more it is worth, provided it is complete with its dust jacket and shows no damage beyond normal wear. The same book in the same printing can be worth £50 or £5,000 depending entirely on condition. There are plenty of worn books; it is the fine ones that are truly rare."
  galleryHeading: "A look at the kinds of pieces Mark handles"
  galleryIntro: "A showcase of the rare books and collectables we deal in. Live stock, with photographs and condition shown openly, is on the marketplace shops below."
  goDeeperEyebrow: "Go deeper"
  goDeeperHeading: "Collecting Tolkien books for fun and investment"
  goDeeperBody: "Collecting Tolkien is a tale of modern, not antiquarian, book collecting: an enjoyable hobby with very few pitfalls, where editions range from £10 to half a million or more. Mark’s full guide covers condition, impressions and dust-jacket wear, market supply and demand, values and investment: everything you need to buy correctly."
  goDeeperButtonLabel: "Read the full collecting & investment guide"
  marketplaceCtaHeading: "Browse rare Tolkien books for sale"
