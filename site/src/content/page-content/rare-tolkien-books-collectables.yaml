  goDeeperEyebrow: "by Mark Faith"
  goDeeperHeading: "Collecting Tolkien Books for Fun and Investment"
  goDeeperBody: >-
    Collecting Tolkien rare books is a tale of modern, not antiquarian book collecting.
    Novice sellers' and buyers' mistakes notwithstanding, collecting Tolkien books is an
    enjoyable hobby with very few pitfalls. Though there are only a handful of titles,
    there are hundreds of editions and printings that range from £10 to £500,000 or even
    more, something for every budget. Most are easy to identify, and the prices generally
    reflect what you are going to get for your money. If it sounds too good to be true,
    it is. While there was in the not so distant past still the remote chance of a Tolkien
    treasure being found in grandmother's attic or a local charity shop, this doesn't
    happen much anymore. The general public are aware that early editions are valuable
    and do not give them away without doing a bit of research first. You do have to take
    the time to teach yourself the very basics, which is part of the pleasure. Dealers
    will help, to a degree, if you are buying from them, but they are busy and cannot be
    called upon to answer every little question you could have researched yourself. I
    publish some guides on my website, and you can subscribe to our collector's
    newsletter at no cost. Where you really need the advice of a specialist dealer is
    when spending thousands on a book. Informed collecting, with the intention of making
    a gain, is investment. It requires experience and management of risk, not luck or a
    gamble. If you cannot afford to spend the time or lose the money, do not do it. If
    you do not have time to educate yourself, then buy from a specialist dealer. Yes,
    there is always a speculative element to investing, but rarely do items of true
    intrinsic value lose their value completely, unless they are in a highly specialised
    field like art or subject to speculators manipulating the market. Tolkien books are
    great literature and have lasted the test of time as each new generation discovers
    his work. This cannot be said for many authors who tend to be generational
    favourites. The best thing you can get from collecting is enjoyment of something you
    can develop a passion for. Do not choose something just because it makes money, but
    because it is of interest to you in some way. In this way, in the worst cases, you
    can enjoy the books even if they do not make lots of money.
  goDeeperButtonLabel: "I publish some guides on my website"
  marketplaceCtaHeading: "Visit our online shop"
