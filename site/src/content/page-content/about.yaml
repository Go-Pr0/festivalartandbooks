text:
  heroEyebrow: "About the dealer"
  heroH1: "Mark Faith, Tolkien rare-book expert"
  heroIntro: "I started in the rare book dealing business as Mark Faith Books in January 2001. I had been a Tolkien collector for at least five years before that. I also sold Wilbur Smith first and signed editions for a short time. Tolkien and Smith were my favourite authors."

  ctaContact: "Contact Mark"
  ctaBrowse: "Browse the collection"

  expertHeading: "What makes Mark a genuine Tolkien expert?"
  expertP1: "I started this business because traditional rare and antiquarian book dealers were not very approachable or helpful. The internet has levelled the playing field. Today, many dealers call themselves Tolkien dealers or Tolkien rare book experts, but when you get to their sites, everything is sold out. This is totally dishonest. Being a specialist dealer means you have the books in stock, ready to sell immediately, rather than just brokering books. I started in the Tolkien Book business as Mark Faith Books (MFB) around January 2001 but had bought and sold in the course of my own collecting prior to that. I began dealing in millions of pounds worth of rare Tolkien items: books, art and memorabilia for institutions and private collectors before my shop was well known on the internet. I was dealing with the most valuable and rarest pieces from the very beginning, items including a signed Hobbit book which sold for £54,000 and a rare Lord of the Rings set which went for £75,000, both unprecedented prices in those days. I continue to accurately predict prices. This has made me one of the biggest specialist Tolkien dealers over the years by Tolkien book sales volume. I have been trading under the name of Festival Art and Books since 2009. My path took a slight detour before I got to where I am today. I discovered that established collectors were having a difficult time adjusting to the market changes the internet brought. They still demanded personalised customer service and were not going to be fobbed off with some on-line gimmick, peddled by someone providing poor service. They asked me to find their rare books for them because they liked my great service. I consequently moved from general rare book dealing to specialised dealing, providing a bespoke sourcing and buying service for an ever-smaller circle of serious, dedicated collectors."
  expertP2: "The key to being a Tolkien book expert is the sheer number of different book examples I have personally viewed, bought and sold over 25 years: many thousands of firsts and early printings. I have sold over 300 first edition sets alone, all first edition printings. This first-hand experience in Tolkien book condition means customers get exactly what they pay for, the first time. I have helped a number of collectors to become more comprehensive in their knowledge of Tolkien and supplied some of the rarest and most important items to a private Tolkien museum opening in Switzerland, GTC Ag. These customers would include private museums, institutions, celebrities, and wealthy individuals building collections of specific authors. They were seeking not just Tolkien books but also art and memorabilia. In fact, only a small fraction of my business with regard to Wilbur Smith and Tolkien, particularly the latter, was conducted over the internet. Nonetheless I handled transactions worth millions of pounds sterling. During this period, whether they came onto the open market or were sold privately, the most important and rarest items passed through my business. This is how I became such an expert even though I was relatively new to the market. I also handled many dozens of original art works and limited edition prints that were Tolkien inspired. This is how I know so many artists producing work inspired by Tolkien, who I still work with today."
  expertBlockquote: "\"Mark introduced me to the works of Tolkien a few years ago and he is now coaching me on all things Tolkien and is helping me build up a pragmatic collection. His knowledge and contacts are incredible, they are to die for and I have no hesitation in recommending Mark.\""
  expertFigcaption: "A long-standing Tolkien collector and client"

  journeyEyebrow: "The journey"
  journeyHeading: "Twenty-five years dealing rare Tolkien"
  journeyIntro: "About Festival in the Shire — I used my expertise and extensive contact list to hold one of the biggest Tolkien events in 2010. Held over three days, it hosted a number of Tolkien experts giving lectures, an art exhibition, stalls, entertainments and a fan exposition."

  whySiteHeading: "What is a Tolkien expert?"
  whySiteP1: "It seems odd to ask this question. Professor J.R.R. Tolkien was scholar and author. He published non-fiction for academic purposes, but became known for popular fiction much later, enjoying financial success very late in his life. The incredible popularity of his two main fiction stories, The Hobbit and The Lord of the Rings, made him the household name he is today. In the mid-1960s the first fan club started in America, where he first became popular. This first fan club, the Tolkien Society of NYC, became focused on the literary and academic aspects of his writing. Tolien refused to participate in any such fan club as he felt it inappropriate for an author to be a fan of his own writing. He was not happy being the centre of attention and having fans at all, at least not until it made him rich. Today, 'fandom' and popular literature go together as key parts of marketing and sales. It was no different back then. There is a difference between loving a good story and discussing the writing technicalities. The Tolkien society was not as popular as his books were and by the year 2000, had all but died off. The Peter Jackson films then put the author back on the world map. Millions of new film fans began reading the books. An uneasy alliance formed between the book fans and film fans. More academic authors began writing about Professor Tolkien and his works. There was a host of Tolkien inspired creative projects which became more popular, thanks to the film, including art, games, and other film merchandising products. These also became popular collectables along with the early printings of his books which went through a huge revival. We predicted huge price increases in Tolkien rare books which have since exceeded our wildest expectations. eBay and the internet had a crucial impact on rare book dealing, and the market for all collectibles for that matter. Market globalisation revealed that many items which collectors thought to be rare were not so scarce after all. This reduced the prices which customers were willing to pay for such items while increasing the value of the truly rare. The information and specialised knowledge which gave dealers their main market advantage become transparent to all via the internet."
  whySiteP2: "The Tolkien Society did not expand from its academic focus until much later, being indifferent to general 'fandom' and collecting books for fun and profit. Our Festival in the Shire was the first event to recognise a new, much wider and diverse Tolkien market. With a focus on collectors, we are now the experts in both rare books and wider Tolkien fan trends. While we know much about Professor Tolkien, we are not expert on J.R.R. Tolkien as an academic. Older book fans may find the commercialisation of Professor Tolkien's masterpieces a bit offensive to his reputation as an academic. However, the brand, or whatever you wish to call it, has become a true cultural phenomenon expanding beyond the books to people of all ages and entertainment tastes. Tolkien is the most famous author of modern times, but his audience is still divided between those who love fantasy fiction and those who do not quite find it to their taste. There are two types of general readers who do not always overlap: those who read for information and knowledge and those who read for fun and enjoyment to spark their imagination and passion. It is on the passionate side that many become collectors and not just readers; they are passionate collectors and we support them. We also observe, however, that digital technology impacted book reading (or collecting) as a pastime. Despite the claims that new technology is enabling, we find it does the opposite: it oppresses, supresses, controls and even brainwashes. We feel this has endangered the future of human imagination and creativity. We intend to do something about it. The downside of the internet then, and now, with the advent of AI, is information overload. The truth must be distilled from conventional wisdom, popular opinion, or outright fabrication. Many traditional dealers were caught out, unable to justify what they were charging for books shown by the internet to be more common than previously thought. While it was wonderful to have more choice and lower prices at their fingertips, customers now had to decide who they wished to do business as well as what to buy. This was a significant change to markets where once there were few specialist dealers holding the lion's share of stock. The internet opened new doors and upset the established markets and key players. New and old dealers were suddenly placed on an equal footing for a time, and both would have to rise to the new challenges the internet created. Many book dealers at the time had 'bricks and mortar' high street shops and did not survive the changes. Perceptive customers, then and now, felt that the internet ought to make things easier and faster for them and not just for the seller/dealer trying to increase profits. Dealers who understood this created an on-line as well as a physical high street presence, enjoying the best of both worlds. The Festival was designed to bring all facets of the Tolkien fan market together under one roof for one major event. While many film and book fans collect, serious collectors are fewer in number and I still provide bespoke services for those wishing to build a complete Tolkien collection without the hassle and without it taking all their free time. They let us do the work for them, sourcing and buying rare copies of books as well as art and other items. We continue to hold small exhibition and fan events, both for fans and serious collectors."
  whySiteSignoff: "Mark Faith, Owner and Founder Festival Art and Books, Festival in the Shire.\n          Contact Mark Faith on <a class=\"underline\" href=\"mailto:markfaith@festivalartandbooks.com\">markfaith@festivalartandbooks.com</a> for further information."

