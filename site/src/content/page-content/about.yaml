seo:
  title: "About Mark Faith, Tolkien Rare Book Expert | Festival Art & Books"
  description: "Mark Faith is a specialist Tolkien rare-book dealer of 25+ years near Machynlleth, Wales: 5,000+ rare Tolkien books sold, 300+ first-edition sets sold, TV expert."

