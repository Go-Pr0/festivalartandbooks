text:
  heroEyebrow: "About the dealer"
  heroH1: "Mark Faith, Tolkien rare-book expert"
  heroIntro: "Mark Faith is a specialist dealer in rare and collectible J.R.R. Tolkien books, working from near Machynlleth in Mid-Wales and selling worldwide. For 25+ years he has bought and sold first editions of The Hobbit and The Lord of the Rings, handling transactions worth millions, including a signed Hobbit at £54,000 and a Lord of the Rings set at £75,000, both records at the time. He has sold over 300 first-edition sets, founded Festival in the Shire (2010), supplied a private Swiss Tolkien museum, and appeared as a Tolkien expert on Four Rooms and Pawn Stars UK. He is not a general bookseller: Tolkien is the whole focus."

  ctaContact: "Contact Mark"
  ctaBrowse: "Browse the collection"

  expertHeading: "What makes Mark a genuine Tolkien expert?"
  expertP1: "The key to being a Tolkien book expert is the sheer number of different book examples I have personally viewed, bought and sold over 25 years: many thousands of firsts and early printings. I have sold over 300 first-edition sets alone, all first-edition printings. This first-hand experience in Tolkien book condition means customers get exactly what they pay for, the first time. Being a specialist dealer means you have the books in stock, ready to sell immediately, rather than just brokering books."
  expertP2: "I started this business because traditional rare and antiquarian book dealers were not very approachable or helpful. Established collectors were having a difficult time adjusting to the changes the internet brought; they still demanded personalised service and asked me to find their rare books for them because they liked my service. I consequently moved from general rare-book dealing to a bespoke sourcing and buying service for an ever-smaller circle of serious, dedicated collectors: private museums, institutions, celebrities and wealthy individuals building collections. They let us do the work for them, sourcing and buying rare copies of books as well as art and memorabilia, without the hassle."
  expertBlockquote: "“Mark introduced me to the works of Tolkien a few years ago and he is now coaching me on all things Tolkien and is helping me build up a pragmatic collection. His knowledge and contacts are incredible; they are to die for and I have no hesitation in recommending Mark.”"
  expertFigcaption: "A long-standing Tolkien collector and client"

  journeyEyebrow: "The journey"
  journeyHeading: "Twenty-five years dealing rare Tolkien"
  journeyIntro: "From a private collector in the mid-1990s to one of the world’s best-known Tolkien rare-book dealers: the milestones along the way."

  whySiteHeading: "Why this site exists"
  whySiteP1: "eBay and the internet had a crucial impact on rare-book dealing, and the market for all collectibles for that matter. Market globalisation revealed that many items which collectors thought to be rare were not so scarce after all. This reduced the prices customers were willing to pay for such items while increasing the value of the truly rare. The information and specialised knowledge which gave dealers their main market advantage became transparent to all via the internet."
  whySiteP2: "The downside of the internet then, and now, with the advent of AI, is information overload: the truth must be distilled from conventional wisdom, popular opinion, or outright fabrication. I built Festival Art and Books to be the accurate, authoritative source on collecting Tolkien: real stock, honest grading, and knowledge earned by handling the rarest pieces first-hand. I continue to accurately predict prices, and we still hold small exhibitions and fan events, both for fans and serious collectors."
  whySiteSignoff: "Mark Faith, Owner and Founder, Festival Art and Books &amp; Festival in the Shire.\n          Based near Machynlleth, Mid-Wales, UK. Sells and delivers worldwide.\n          <br>Contact: <a class=\"underline\" href=\"mailto:MarkFaith@festivalartandbooks.com\">MarkFaith@festivalartandbooks.com</a>"

  exploreHeading: "Explore Mark’s story further"
  exploreCards:
