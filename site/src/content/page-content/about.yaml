seo:
  title: "About Mark Faith, Tolkien Rare Book Expert | Festival Art & Books"
  description: "Mark Faith is a specialist Tolkien rare-book dealer of 25+ years near Machynlleth, Wales: first-edition sales up to £300,000, 300+ first-edition sets sold, TV expert."

heroImage: "../../assets/story/mark-faith-tolkien-rare-book-dealer-portrait.jpg"
heroImageAlt: "Mark Faith, Tolkien rare-book dealer and founder of Festival Art and Books, smiling outdoors"

stats:
  - value: 25
    suffix: "+"
    label: "Years specialising in Tolkien"
  - value: 300
    suffix: "+"
    label: "First-edition sets sold"
  - value: 125000
    prefix: "£"
    label: "Highest Lord of the Rings set sold"

timeline:
  - year: "c. 1996"
    title: "A collector first"
    body: "Mark began collecting Tolkien for at least five years before he ever traded, buying and selling first editions in the course of building his own collection. Tolkien, alongside Wilbur Smith, was a favourite author from the start."
  - year: "January 2001"
    title: "Mark Faith Books"
    body: "He opened as a rare-book dealer under the name Mark Faith Books, dealing the most valuable and rarest pieces (books, art and memorabilia) for institutions and private collectors from the very beginning, before the shop was well known online."
  - year: "Record sales"
    title: "Unprecedented prices"
    body: "Through his hands passed a signed Hobbit that sold for £54,000 and a Lord of the Rings set for £75,000, the highest prices ever achieved for those books at the time. He has sold over 300 first-edition sets, all first-edition printings."
  - year: "2009"
    title: "Festival Art and Books"
    body: "Mark consolidated the specialist dealership under the name Festival Art and Books, the business he still runs today: Tolkien rare books and Tolkien-inspired original art."
  - year: "2010"
    title: "Festival in the Shire"
    body: "He created and staged Festival in the Shire, one of the biggest Tolkien events of the year. Held over three days, it hosted a number of Tolkien experts giving lectures, an art exhibition, stalls, entertainments and a fan exposition. It made him one of the world’s best-recognised dealers of collectible Tolkien books and art."
  - year: "Switzerland"
    title: "The Swiss Tolkien museum (GTC)"
    body: "Mark supplied some of the rarest and most important items to a private Tolkien museum opening in Switzerland, GTC AG, and was involved in its founding talks."
  - year: "On screen"
    title: "Tolkien expert on television"
    body: "Mark brought rare-Tolkien collecting to a wider audience on Channel 4’s Four Rooms and the UK version of Pawn Stars on the History Channel, showcasing his complete set of the first ten Hobbit impressions and his Lord of the Rings first editions."

