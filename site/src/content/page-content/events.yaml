seo:
  title: "Events: Tolkien Exhibitions & Talks by Mark Faith | Festival Art & Books"
  description: >-
    Talks, exhibitions and Tolkien collecting events featuring Mark Faith — Festival
    Art and Books appearances at festivals and Tolkien Society gatherings.

text:
  heroEyebrow: "Exhibitions & talks"
  heroH1: "Events"
  heroIntro: >-
    We have no Tolkien Rare Book events scheduled, but have plans to start them again soon. Watch this space.

    We sometimes exhibit at others' events. If you would be interested in having us exhibit at your event, please contact us. Some past events are highlighted below. In addition, we organised our own very large event with over 500 attendees, Festival in the Shire in 2010. See the <a class="underline decoration-[var(--color-gold-500)]/60 underline-offset-4" href="/festival-in-the-shire">link</a>.
  pastEventsHeading: "Past events"
  moreEventsHeading: "More events planned"
  moreEventsParagraph: "If you would be interested in having us exhibit at your event, please contact us."
  ctaButtonFestival: "About Festival in the Shire"
  ctaButtonContact: "Register your interest"
