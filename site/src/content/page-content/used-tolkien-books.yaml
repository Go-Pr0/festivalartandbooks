seo:
  title: "Used Tolkien Books: Expert Q&A | Festival Art & Books"
  description: "Answer-first guide to buying used and rare Tolkien books: first-edition values, dust jackets, restoration, states and what to collect, from 25-year specialist Mark Faith."

heroImage: "../../assets/showcase/tolkien-used-collectable-books-montage.jpg"
heroImageAlt: "Collection of used and collectable J.R.R. Tolkien hardback books"

text:
  heroEyebrow: "Questions & Answers"
  heroH1: "Used & Rare Tolkien Books: Q&A"
  heroIntro: "Straight answers to the questions buyers actually ask, based on thirty-plus years as a Tolkien collector and dealer. Condition is everything; there is no “official” price, only what someone will pay. If you are about to spend thousands, contact us directly for expert advice first."
  closingParagraph: "These questions, and many more, are covered in detail in Mark’s free Tolkien Collector’s Guide. For a copy and to subscribe to the newsletter, email <a href=\"mailto:MarkFaith@festivalartandbooks.com\" class=\"text-[var(--color-midnight-900)] underline decoration-[var(--color-gold-600)]/50 underline-offset-4 hover:text-[var(--color-oxblood-600)]\">MarkFaith@festivalartandbooks.com</a>."
  marketplaceCtaHeading: "Find your next Tolkien book"
