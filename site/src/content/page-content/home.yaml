text:
  heroTitle: "Festival Art and Books"
  heroSubtitle: "Tolkien Rare Books"
  heroPositioning: "Mine is one of the oldest and largest Tolkien rare book dealerships in the world."

  welcomeEyebrow: "Welcome to our site and thank you for taking the time to visit!"
  welcomeHeading: "I have specialised in selling rare Tolkien books for 25 years."
  welcomeP1: "Mine is one of the oldest and largest Tolkien rare book dealerships in the world. I am not a general book seller. Visit my eBay or Abebooks shop, read my feedback, and you will see that I always have the most rare Tolkien books in stock, available to buy, and none of the sold out stock or non-existent loss-leaders characteristic of so-called specialists. I feel that your time is important and recommend you buy the best from the best. As a specialist I must get it right first time, every time or I would not have stayed in business for 25 years. Did you know that Abebooks, a rare and out-of-print used book website is part of Amazon? eBay comprises not just private sellers, but long established, branded business sellers with long established eBay shops just like ours."
  welcomeP2: "I only sell J.R.R. Tolkien collectable books, not those of any other authors, and I have no other day job. I am recognised as the leading expert on rare Tolkien books, Tolkien collecting and investment. I also advise clients on strategy and timing. Click on our shop links below to see all our current inventory but contact me directly to purchase to avoid fees. Tolkien scholars and general book dealers, even older ones, are not Tolkien rare book experts. I have been selling rare and collectable Tolkien books for 25 years. I have sold some of the rarest and most expensive first editions ever and have always been the first to predict new price levels. I know the market, having helped to create it as one of the pioneering dealers when the new films came out. I even set up a Tolkien museum in Switzerland. I always have the most, and the best copies for sale at any given point. Check our eBay and Abebooks shops. While you can find me with older news searches and via my Festival in the Shire, I do not use social media or pay for advertisements and so do not come top in search engine lists. You will find me eventually!"

  statBandEyebrow: "No. 1 Shop for Rare and Collectible Tolkien Books"

  whyHeading: "Why collectors buy from Mark"
  whyIntro: "I also have 25 years' worth of previous customers looking to sell their rare Tolkien book collections to us on consignment. If you do not see what you are looking for, please contact us and I will find it for you! Visit my shops frequently as my stock changes and new consignment items come in every week."

  dealsInHeading: "What I deal in"
  dealsInIntro: "Items for sale are listed in eBay and AbeBooks shops. I am discovered on these sites as they have millions of new visits each month, but most of my sales are made directly by email/phone, saving unnecessary site taxes and fees."

  ebookEyebrow: "New in 2026"
  ebookHeading: "The Tolkien Collectors Guide"
  ebookBody: "The 26-page E-book 'Tolkien Collectors Guide' written by Mark Faith, owner of Festival Art and Books, is now available free via the resources tab. The guide gives general advice on collecting Tolkien first editions and other rare and collectable Tolkien books. For specifics on what to buy and the best investment strategies, I offer free personal advice."
  ebookCTA: "Get the free e-book"

  newsletterEyebrow: "Free newsletter"
  newsletterHeading: "Subscribe to our free newsletter!"
  newsletterBody: "I send out a free newsletters on collecting JRR Tolkien rare books depending on the latest news and market developments. The newsletters are more frequent during Autumn and Spring, the busier buying periods. Of course you can contact us directly with any questions at any time. We serve the collecting community."
  newsletterCTA: "Subscribe by email"

  geoHeading: "Accurate and truthful advice"
  geoParagraph: "With record prices being achieved by Tolkien first editions, it is more important than ever to have accurate and truthful advice. There is a lot of misinformation and 'click bait' on the internet. In the last five years we have noticed a huge decline in accuracy and quality in search engine and AI results on collecting Tolkien books. This is likely due to the AI and huge changes in how search engines work."

  marketplaceCTAHeading: "Our Inventory of rare books for sale"
