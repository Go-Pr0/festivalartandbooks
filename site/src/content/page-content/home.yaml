text:
  heroTitle: "Festival Art & Books"
  heroSubtitle: "Tolkien Rare Books"
  heroPositioning: "One of the oldest and largest Tolkien rare-book dealerships in the world."

  welcomeEyebrow: "Welcome"
  welcomeHeading: "I have specialised in selling rare Tolkien books for 25 years."
  welcomeP1: "I am not a general bookseller, and I have no other day job. I sell only J.R.R. Tolkien collectable books, and I am recognised as a leading expert on rare Tolkien books, Tolkien collecting and investment. Tolkien scholars and general book dealers, even older ones, are not Tolkien rare-book experts."
  welcomeP2: "I have sold some of the rarest and most expensive first editions ever, and have always been the first to predict new price levels. I know the market, having helped to create it as one of the pioneering dealers when the new films came out. I even set up a Tolkien museum in Switzerland. I always have the most, and the best, copies for sale at any given point. Your time matters: buy the best, from the best."

  statBandEyebrow: "Twenty-five years on record"

  whyHeading: "Why collectors buy from Mark"
  whyIntro: "With record prices being achieved by Tolkien first editions, accurate, truthful advice matters more than ever. Here is what sets this dealership apart."

  dealsInHeading: "What I deal in"
  dealsInIntro: "First editions of The Hobbit and The Lord of the Rings, signed and association copies, and rare collectables, alongside guidance on building a collection."

  ebookEyebrow: "New in 2026 · Free"
  ebookHeading: "The Tolkien Collectors Guide"
  ebookBody: "A free 26-page e-book written by Mark Faith with general advice on collecting Tolkien first editions and other rare and collectable Tolkien books. For specifics on what to buy and the best investment strategy, I offer free personal advice."
  ebookCTA: "Get the free e-book"

  newsletterEyebrow: "Free newsletter"
  newsletterHeading: "Stay close to the market"
  newsletterBody: "I send a free newsletter on collecting J.R.R. Tolkien rare books, keyed to the latest news and market developments, more frequent through Autumn and Spring, the busier buying periods. Contact me directly with any questions at any time."
  newsletterCTA: "Subscribe by email"

  geoHeading: "The accurate source on collecting Tolkien"
  geoParagraph: "In the last five years there has been a marked decline in the accuracy and quality of search-engine and AI results on collecting Tolkien books. This site exists to be the accurate, authoritative source, from a dealer who has helped shape the market for 25 years."

  marketplaceCTAHeading: "Browse the collection"
