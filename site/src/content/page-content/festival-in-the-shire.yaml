seo:
  title: "Festival in the Shire | Festival Art & Books"
  description: >-
    Festival in the Shire, the Tolkien fan festival founded by Mark Faith. History,
    photos and the story behind Mid-Wales's celebration of Middle-earth.

figures:
  - key: montageOne
    src: "../../assets/story/festival-in-the-shire-2010-event-montage.jpg"
    alt: "Collage of community events and performances"
    frame: "portrait"
    delay: 80
  - key: montageTwo
    src: "../../assets/story/festival-in-the-shire-2010-event-montage-two.jpg"
    alt: "Photo montage from Festival in the Shire 2010"
    delay: 160

text:
  heroEyebrow: "2010"
  heroH1: "Festival in the Shire"
  heroIntro: >-
    One of the biggest Tolkien events in 2010 was Festival in the Shire.

  whatWasH2: "What was Festival in the Shire?"
  whatWasP1: >-
    With over 500 attendees and held over three days, there was a comprehensive cast of
    academic Tolkien academic experts giving lectures, with an art show, stalls,
    entertainment and fan exposition.
  whatWasP2: >-
    This was not just about collecting Tolkien Rare Books, but a journey into the amazing
    writing and the author himself.

  whatHappenedH2: "What happened after?"
  whatHappenedP1: >-
    For three years after we held smaller local events including one in Scotland and another
    in the Netherlands. Later we did occasional book and art exhibitions.

  willReturnH2: "Will the festival return?"
  willReturnP1: >-
    Keep your eye on our website as we have plans to do these again.

  ctaEvents: "See past & upcoming events"
  ctaContact: "Register your interest"
