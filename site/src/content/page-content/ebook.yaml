seo:
  title: "Free Tolkien Collector’s Guide E-book | Festival Art & Books"
  description: >-
    Get Mark Faith’s free 26-page Tolkien Collector’s Guide e-book: practical advice on buying and collecting rare Tolkien books. Free with any purchase or with the newsletter.

heroImage: "../../assets/showcase/mark-faith-tolkien-dealer-portrait.jpg"
heroImageAlt: "Mark Faith, author of the free Tolkien Collector’s Guide e-book"

text:
  heroEyebrow: "Free collector’s guide"
  heroH1: "The Tolkien Collector’s Guide"
  heroIntro: >-
    The Tolkien Collectors Guide is now available free if you buy something from us.
    The monthly newsletter is also free. For a copy or to join our mailing list Email:
    markfaith@festivalartandbooks.com
  ctaEmailMark: "Email Mark for your free copy"

  fromIntroEyebrow: "From the introduction"
  noteFromMarkH2: "A note from Mark"
  noteP1: >-
    Thank you for investing your time in this little guide. I hope it will enhance
    your Tolkien collecting experience, save you time and help you to make better
    choices. Many people consider their Tolkien book collecting just a hobby, but for
    most it's very much a paying hobby. I financed my first collection by re-selling
    spare copies. If you are old enough and lucky enough to have begun collecting
    early editions before the Peter Jackson films came out you will have acquired some
    real bargains given current valuations. Tolkien early editions and printings are
    easy to identify, but prices do very widely so it can be tricky knowing what to
    pay for a particular copy.
  noteP2: >-
    I have been a specialist Tolkien dealer for twenty-five years and was a private
    collector before that. I am not an antiquarian book or literature expert; I only
    know Tolkien books as a personal reading passion. I think I know more than most
    dealers because I have specialised so narrowly and have handled thousands of
    copies myself. There were no other full-time specialist Tolkien dealers when I
    started, none now either, but there are dozens of 'startups' with many general
    dealers using Tolkien books focus as loss leaders. I am not a broker, I have
    dozens of rare editions in stock ready to buy. I do sell some books for customers
    on consignment. At the core of my business is a true passion for the author and
    the fantasy genre. I am a fan and completely open and willing to discuss
    collecting and the works themselves. This guide is my way sharing what I have
    learned.
  noteP3: >-
    Please feel free to call me or email your own tips, anecdotes and suggestions so
    I can improve future editions.

  howToGetH2: "How to get the e-book"
  step1Label: "Step 1:"
