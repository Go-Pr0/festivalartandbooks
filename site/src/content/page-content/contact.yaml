seo:
  title: "Contact Mark Faith | Festival Art & Books"
  description: >-
    Contact Tolkien rare-book specialist Mark Faith near Machynlleth, Mid-Wales, UK. Email is best; he travels and calls back. Sells and delivers worldwide; buy direct to save fees.

heroImage: "../../assets/showcase/mark-faith-tolkien-dealer-portrait.jpg"
heroImageAlt: "Mark Faith, Tolkien rare-book specialist and founder of Festival Art and Books"

text:
  heroEyebrow: "Get in touch"
  heroH1: "Contact Mark Faith"
  heroIntro: >-
    Festival Art and Books is based near Machynlleth, Mid-Wales, UK, and sells and
    delivers worldwide. Mark travels a lot in the course of the business, so email is
    the best way to reach him, and he will call you back.

  portraitCaption: "Mark Faith, owner and founder, Festival Art and Books and Festival in the Shire."

  whereToBuyH2: "Where to buy"
  whereToBuyP1: >-
    Stock is listed on our marketplace shops, where every item is shown with honest
    photographs and condition notes. For anything of real value, or to commission a
    sourcing service for a specific edition, set, or piece of art, email Mark
    directly. Dealing direct saves the marketplace fees and puts you in touch with the
    specialist himself.

  ctaEbay: "Shop on eBay"
  ctaAbebooks: "Shop on AbeBooks"
