items:
- date: 14th November
  location: Metropolis — Nazareth VIP gig / DVD launch
  detail: Iconic British rock band Nazareth announce a VIP gig and DVD launch featuring renowned Tolkien-inspired artist Rodney Matthews, who designed the sleeve artwork for the forthcoming Nazareth DVD release. Rodney gave a talk on the day about his art, with an exhibition of his work at Metropolis for one month covering a range of his rock album covers, including his seminal artwork for Nazareth’s 1978 album ‘No Mean City’.
- date: 11th – 18th November
  location: Artist Gallery, 403 Holburn Street, Aberdeen
  detail: Festival in the Shire Exhibition returns to Scotland. A celebration of fantasy art including classic rock album covers from Roger Dean and Rodney Matthews, with album covers for the bands YES, ASIA, Uriah Heap, Nazareth, Magnum and other classic rock bands as well as art for books, posters and calendars. Artist signed prints and posters were available for sale alongside Tolkien books and memorabilia. Rodney Matthews gave a free talk about his art on Tuesday 12th at 6:30pm and again on Saturday 16th at 6:30pm at the Artist Gallery. Other fantasy artist works on display included Roger Dean, Rainer Kalwit, Ruth Lacon, Joe Gilronan, Tim Kirk and Ted Nasmith.

